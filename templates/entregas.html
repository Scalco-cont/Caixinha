<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entregas - Scalco Contabilidade</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .content-viewer {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin: 20px;
            max-width: 1200px;
            margin: 20px auto;
        }
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: white;
            margin-bottom: 20px;
        }
        .back-button {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }
        .back-button:hover {
            background-color: #d40000;
        }
        .empresas-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .empresas-table th, .empresas-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            vertical-align: top;
            border-right: 1px solid #ddd;
        }
        .empresas-table th:last-child,
        .empresas-table td:last-child {
            border-right: none;
        }
        .empresas-table th:nth-child(1),
        .empresas-table td:nth-child(1) {
            width: 120px;
        }
        .empresas-table th:nth-child(3),
        .empresas-table td:nth-child(3) {
            width: 250px;
        }
        .empresas-table th {
            background-color: #f5f5f5;
            font-weight: bold;
        }
        .empresas-table tr:hover {
            background-color: #f9f9f9;
        }
    </style>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
</head>
<body>
    <div class="header-container">
        <h1>Visualizador de Entregas</h1>
        <a href="/" class="back-button">Voltar</a>
    </div>
    <div class="content-viewer">
        <table class="empresas-table">
            <thead>
                <tr>
                    <th>Número</th>
                    <th>Nome da Empresa</th>
                    <th>Gerente</th>
                </tr>
            </thead>
            <tbody>
                {% for empresa in empresas %}
                <tr>
                    <td>{{ empresa.numero }}</td>
                    <td>{{ empresa.nome }}</td>
                    <td>{{ empresa.gerente }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
